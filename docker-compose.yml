services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://demo:demo@postgres:5432/demo
      JWT_SECRET: dev-jwt-secret-change-in-production
      PORT: 3000
      SSO_ISSUER: ${SSO_ISSUER:-}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID:-}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      - ./packages/backend/src:/app/src
      - ./packages/backend/prisma:/app/prisma
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3000
      VITE_SSO_CLIENT_ID: ${SSO_CLIENT_ID:-}
      VITE_SSO_ISSUER: ${SSO_ISSUER:-}
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
  backend_uploads:
